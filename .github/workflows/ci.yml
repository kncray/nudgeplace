# CI 계약(boundary-contract C-1·C-5): 잡 id `quality-gate`는 required status check
# context로 고정되며, tests/ci/test_ci_contract.py가 trigger·스텝 순서·
# continue-on-error/조건부 skip 부재를 repo-local로 강제한다.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    # 접속 계약(config/settings/base.py POSTGRES_*)을 잡 env로 주입 — 로컬
    # docker-compose 기본값과 동일(비밀 아님). 서비스는 runner의 localhost:5432에 매핑.
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: nudgeplace
      POSTGRES_USER: nudgeplace
      POSTGRES_PASSWORD: nudgeplace
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nudgeplace
          POSTGRES_USER: nudgeplace
          POSTGRES_PASSWORD: nudgeplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nudgeplace -d nudgeplace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv (Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Boundary check (tach)
        run: uv run tach check
      - name: Tests
        run: uv run pytest
